<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNO 在线对战</title>
  <meta name="description" content="UNO 在线多人对战卡牌游戏" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-dark: #0f1119;
      --bg-card: rgba(255,255,255,0.06);
      --bg-glass: rgba(255,255,255,0.08);
      --glass-border: rgba(255,255,255,0.12);
      --text: #e8e6e3;
      --text-muted: #8b8d93;
      --accent: #ff6b35;
      --accent-glow: rgba(255,107,53,0.3);
      --success: #34d399;
      --danger: #ef4444;
      --warning: #fbbf24;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: var(--text);
      background: var(--bg-dark);
      background-image:
        radial-gradient(ellipse 800px 600px at 20% 10%, rgba(255,107,53,0.08), transparent),
        radial-gradient(ellipse 600px 500px at 80% 90%, rgba(59,130,246,0.08), transparent);
    }

    /* ─── 大厅 ──────────────────────────── */

    #lobby, #gameArea { display: none; }
    #lobby.active, #gameArea.active { display: block; }

    .lobby-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .lobby-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .lobby-header h1 {
      font-size: 42px;
      font-weight: 800;
      background: linear-gradient(135deg, #ff6b35, #fbbf24, #34d399, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }

    .lobby-header p {
      color: var(--text-muted);
      margin-top: 8px;
      font-size: 15px;
    }

    .glass-panel {
      background: var(--bg-glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }

    .glass-panel h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    input, button, select {
      font-family: inherit;
      font-size: 14px;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--text);
      background: rgba(255,255,255,0.05);
      outline: none;
      transition: all 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    input { flex: 1; }

    button {
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
    }

    button:hover { background: rgba(255,255,255,0.1); }

    button.primary {
      background: linear-gradient(135deg, #ff6b35, #e85d26);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    button.primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }

    button.success {
      background: linear-gradient(135deg, #34d399, #10b981);
      border-color: transparent;
      color: #fff;
    }

    button[disabled] {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
    }

    .room-list { display: grid; gap: 8px; }

    .room-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
    }

    .room-item:hover {
      background: rgba(255,255,255,0.08);
      border-color: var(--accent);
    }

    .room-item .room-id {
      font-weight: 800;
      font-size: 16px;
      letter-spacing: 1px;
    }

    .room-item .room-meta {
      display: flex;
      gap: 12px;
      align-items: center;
      font-size: 13px;
      color: var(--text-muted);
    }

    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-waiting { background: rgba(251,191,36,0.15); color: var(--warning); }
    .badge-playing { background: rgba(239,68,68,0.15); color: var(--danger); }
    .badge-finished { background: rgba(52,211,153,0.15); color: var(--success); }

    .empty-state {
      text-align: center;
      padding: 32px;
      color: var(--text-muted);
    }

    /* ─── 游戏区域 ──────────────────────── */

    .game-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      gap: 16px;
      min-height: 100vh;
      grid-template-rows: auto auto 1fr auto;
    }

    .game-top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .game-top-bar h1 {
      font-size: 20px;
      font-weight: 800;
    }

    .game-top-bar .room-tag {
      background: var(--bg-glass);
      border: 1px solid var(--glass-border);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .game-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
    }

    .player-card {
      padding: 14px 16px;
      background: var(--bg-glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s;
    }

    .player-card.current-turn {
      border-color: var(--warning);
      background: rgba(251,191,36,0.08);
      box-shadow: 0 0 20px rgba(251,191,36,0.1);
    }

    .player-card.is-me {
      border-color: var(--accent);
    }

    .player-card .p-name {
      font-weight: 600;
    }

    .player-card .p-count {
      font-size: 13px;
      color: var(--text-muted);
    }

    .player-card .p-host {
      font-size: 11px;
      color: var(--warning);
      margin-left: 4px;
    }

    .player-card .p-offline {
      font-size: 11px;
      color: var(--danger);
      margin-left: 4px;
    }

    .table-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .table-top-card {
      width: 140px;
      height: 200px;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 800;
      border: 3px solid rgba(255,255,255,0.2);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      position: relative;
      text-shadow: 0 2px 4px rgba(0,0,0,0.4);
      transition: all 0.3s;
    }

    .table-top-card small {
      font-size: 12px;
      font-weight: 400;
      opacity: 0.8;
      position: absolute;
      top: 10px;
      left: 12px;
    }

    .chosen-color-indicator {
      font-size: 13px;
      color: var(--text-muted);
    }

    .action-log {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      min-height: 20px;
    }

    .action-bar {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .hand-section h2 {
      font-size: 16px;
      margin-bottom: 12px;
      color: var(--text-muted);
    }

    .hand {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 10px;
      padding-bottom: 20px;
    }

    /* ─── UNO 卡牌 ──────────────────────── */

    .uno-card {
      border-radius: 12px;
      height: 130px;
      color: #fff;
      font-weight: 800;
      font-size: 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: transform 0.15s, box-shadow 0.15s, outline-color 0.15s;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      user-select: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
      outline: 3px solid transparent;
    }

    .uno-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
    }

    .uno-card.selected {
      transform: translateY(-10px);
      outline-color: var(--warning);
      box-shadow: 0 16px 40px rgba(251,191,36,0.3);
    }

    .uno-card small {
      position: absolute;
      left: 8px;
      top: 6px;
      font-size: 10px;
      opacity: 0.7;
      font-weight: 400;
    }

    .uno-card .card-text {
      font-size: 20px;
    }

    .c-Red { background: linear-gradient(150deg, #ef4444, #b91c1c); }
    .c-Yellow { background: linear-gradient(150deg, #fbbf24, #d97706); color: #1a1a1a; text-shadow: none; }
    .c-Blue { background: linear-gradient(150deg, #3b82f6, #1d4ed8); }
    .c-Green { background: linear-gradient(150deg, #22c55e, #15803d); }
    .c-Black { background: linear-gradient(150deg, #374151, #111827); }

    /* ─── 选色弹窗 ──────────────────────── */

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      place-items: center;
    }

    .modal-overlay.active { display: grid; }

    .modal {
      background: #1a1d28;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .modal h3 {
      margin-bottom: 20px;
      font-size: 18px;
    }

    .color-picker {
      display: grid;
      grid-template-columns: repeat(4, 80px);
      gap: 12px;
      justify-content: center;
    }

    .color-btn {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      border: 3px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 800;
      font-size: 14px;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    }

    .color-btn:hover {
      transform: scale(1.08);
      border-color: #fff;
    }

    .color-btn.cb-Red { background: linear-gradient(135deg, #ef4444, #b91c1c); }
    .color-btn.cb-Yellow { background: linear-gradient(135deg, #fbbf24, #d97706); color: #1a1a1a; text-shadow: none; }
    .color-btn.cb-Blue { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
    .color-btn.cb-Green { background: linear-gradient(135deg, #22c55e, #15803d); }

    /* ─── 胜利弹窗 ──────────────────────── */

    .win-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      z-index: 200;
      place-items: center;
    }

    .win-overlay.active { display: grid; }

    .win-modal {
      text-align: center;
      padding: 48px;
    }

    .win-modal h2 {
      font-size: 48px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #fbbf24, #ff6b35);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .win-modal p {
      font-size: 20px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    /* ─── 状态提示 ────────────────────── */

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(239,68,68,0.95);
      color: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      z-index: 300;
      transition: transform 0.3s ease;
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ─── 等待开始面板 ─────────────────── */

    .waiting-panel {
      text-align: center;
      padding: 40px 20px;
    }

    .waiting-panel h2 {
      font-size: 24px;
      margin-bottom: 16px;
      color: var(--text);
    }

    .waiting-panel p {
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    /* ─── 响应式 ────────────────────────── */

    @media (max-width: 700px) {
      .lobby-header h1 { font-size: 30px; }
      .hand { grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); }
      .uno-card { height: 110px; font-size: 18px; }
      .table-top-card { width: 110px; height: 160px; font-size: 28px; }
      .color-picker { grid-template-columns: repeat(2, 70px); }
      .color-btn { width: 70px; height: 70px; }
    }
  </style>
</head>
<body>

  <!-- ════ 大厅 ════ -->
  <div id="lobby" class="active">
    <div class="lobby-container">
      <div class="lobby-header">
        <h1>UNO 在线对战</h1>
        <p>创建或加入房间，邀请好友一起玩 UNO！</p>
      </div>

      <div class="glass-panel">
        <h2>加入房间</h2>
        <div class="form-row">
          <input id="nicknameInput" type="text" placeholder="输入你的昵称" maxlength="12" />
        </div>
        <div class="form-row">
          <input id="roomIdInput" type="text" placeholder="房间号（默认 ROOM01）" value="ROOM01" />
          <button id="joinBtn" class="primary">加入</button>
        </div>
      </div>

      <div class="glass-panel">
        <h2>创建新房间</h2>
        <div class="form-row">
          <button id="createRoomBtn" class="success" style="width: 100%;">🎲 创建房间</button>
        </div>
      </div>

      <div class="glass-panel">
        <h2>房间列表</h2>
        <div id="roomList" class="room-list">
          <div class="empty-state">加载中...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ════ 游戏区域 ════ -->
  <div id="gameArea">
    <div class="game-container">
      <div class="game-top-bar">
        <h1>🃏 UNO 在线对战</h1>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
          <span id="roomTag" class="room-tag"></span>
          <span id="myNameTag" class="room-tag"></span>
          <button id="leaveBtn" style="font-size:13px;">离开房间</button>
        </div>
      </div>

      <div id="playersBar" class="game-info"></div>

      <div class="table-area">
        <div id="waitingPanel" class="waiting-panel" style="display:none;">
          <h2>等待玩家加入...</h2>
          <p id="waitingText">至少需要2名玩家才能开始游戏</p>
          <button id="startGameBtn" class="primary" style="font-size:16px;padding:14px 40px;">开始游戏</button>
        </div>

        <div id="playingArea" style="display:none;">
          <div style="display:flex;flex-direction:column;align-items:center;gap:14px;">
            <div id="topCardDisplay"></div>
            <div id="chosenColorDisplay" class="chosen-color-indicator"></div>
            <div id="actionLog" class="action-log"></div>
            <div class="action-bar">
              <button id="drawBtn">🎴 摸牌</button>
              <button id="playBtn" class="primary">✅ 出牌</button>
            </div>
          </div>
        </div>
      </div>

      <div class="hand-section">
        <h2>🖐 我的手牌</h2>
        <div id="hand" class="hand"></div>
      </div>
    </div>
  </div>

  <!-- ════ 选色弹窗 ════ -->
  <div id="colorModal" class="modal-overlay">
    <div class="modal">
      <h3>选择一种颜色</h3>
      <div class="color-picker">
        <button class="color-btn cb-Red" data-color="Red">红色</button>
        <button class="color-btn cb-Yellow" data-color="Yellow">黄色</button>
        <button class="color-btn cb-Blue" data-color="Blue">蓝色</button>
        <button class="color-btn cb-Green" data-color="Green">绿色</button>
      </div>
    </div>
  </div>

  <!-- ════ 胜利弹窗 ════ -->
  <div id="winOverlay" class="win-overlay">
    <div class="win-modal">
      <h2>🎉 游戏结束</h2>
      <p id="winnerText"></p>
      <button id="backToLobbyBtn" class="primary" style="font-size:16px;padding:14px 40px;">返回大厅</button>
    </div>
  </div>

  <!-- ════ Toast 提示 ════ -->
  <div id="toast" class="toast"></div>

  <script src="./index.js"></script>
</body>
</html>
